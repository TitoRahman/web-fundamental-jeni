<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Document</title>
    </head>
    <body>
        <form>
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Username">
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="email">
            <br>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="password">
            <br>
            <label for="phone">Phone</label>
            <input type="tel" name="phone" id="phone" placeholder="phone">
            <hr>
            <label for="birthday">Birthday</label>
            <input type="date" name="birthday" id="birthday">
            <hr>
            <label for="gender">Gender</label>
            <select name="gender" id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="no">Prefer Not To Say</option>
            </select>
            <br>
            <p>Choose your grade</p>
            <label for="grade-x">Grade X</label>
            <input type="radio" name="grade" id="grade-x">
            <label for="grade-xi">Grade Xi</label>
            <input type="radio" name="grade" id="grade-xi">

            <p>Have you read everything?</p>
            <label for="book-1">Book I</label>
            <input type="checkbox" name="book" id="book-1">
            <label for="book-2">Grade Xi</label>
            <input type="checkbox" name="book" id="book-2">

            <br>
            <textarea name="message" id="message" cols="30" rows="10"></textarea>
            <button>Submit</button>
        </form>
    </body>
</html>
